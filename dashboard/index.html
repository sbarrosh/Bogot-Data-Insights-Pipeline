<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bogotá Weather Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🌦️ Bogotá Weather Dashboard</h1>

  <div class="kpis">
    <div class="card">
      <h3>Última temperatura</h3>
      <p id="temp"></p>
    </div>
    <div class="card">
      <h3>Humedad</h3>
      <p id="humidity"></p>
    </div>
  </div>

  <canvas id="tempChart"></canvas>
  <canvas id="humidityChart"></canvas>

  <script src="script.js"></script>
</body>
</html>
